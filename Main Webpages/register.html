<html>
    <meta name="google-signin-client_id" content="YOUR_CLIENT_ID.apps.googleusercontent.com">
    <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="shortcut icon" type="image/x-icon" href="imgs/img-sys/title-logo.png" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <title>Account Login</title>

        <header>
            <a href="#" class="logo">Structurize</a>
        </header>
        <section class="banner"></section>
    <body class="login-body">
        <div class="background">
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <form class="register-form" id="register-user">
            <h3>Login Here</h3>
    
            <label class="register-label" for="username">Username</label>
            <input class="register-input" type="text" placeholder="Email" id="rusername" required>
    
            <label class="register-label" for="password">Password</label>
            <input class="register-input" type="password" placeholder="Password" id="rpassword" required>

            <label class="register-label" for="password">Password</label>
            <input class="register-input" type="password" placeholder="Re-type Password" id="repassword" required>

            <button type="submit" class="register-button">Register</button>
        </form>
        <!--<script type="text/javascript" src="script2.js"></script> -->
        <script src="script3.js"></script>
        <script src="https://apis.google.com/js/platform.js" async defer></script>
    </body>
</html>
