<html>
    <meta name="google-signin-client_id" content="YOUR_CLIENT_ID.apps.googleusercontent.com">
    <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="shortcut icon" type="image/x-icon" href="imgs/img-sys/title-logo.png" />
        <title>Account Login</title>

        <header>
            <a href="#" class="logo">Structurize</a>
        </header>
        <section class="banner"></section>
    <body class="login-body">
        <div class="background">
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <form class="login-form" id="log-into-acc">
            <h3>Login Here</h3>
    
            <label class="login-label" for="username">Username</label>
            <input class="login-input" type="text" placeholder="Email" id="username" required>
    
            <label class="login-label" for="password">Password</label>
            <input class="login-input" type="password" placeholder="Password" id="password" required>
    
            <button type="submit" class="login-button">Log In</button>
            <a href="register.html">Not a user yet? Register Here!</a>
        </form>
        <script type="text/javascript" src="script2.js"></script>
        <script src="https://apis.google.com/js/platform.js" async defer></script>
    </body>
</html>
